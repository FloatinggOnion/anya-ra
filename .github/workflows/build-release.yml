name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds - both use macos-latest (Apple Silicon runner)
          # x86_64 is cross-compiled from ARM64 (Tauri 2.x supports this)
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
          # Windows builds
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            arch: x86
            target: i686-pc-windows-msvc
          - os: windows-latest
            arch: aarch64
            target: aarch64-pc-windows-msvc
          # Linux builds
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            arch: aarch64
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Set up MSVC ARM64 cross-compilation environment
        if: runner.os == 'Windows' && matrix.arch == 'aarch64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Install Linux x86_64 dependencies
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev libsoup-3.0-dev

      - name: Set up QEMU for ARM64 binary execution
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Linux aarch64 cross-compilation dependencies
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing Ubuntu sources to amd64 only.
          # Ubuntu 24.04 uses DEB822 format in ubuntu.sources; security.ubuntu.com
          # does NOT host arm64 packages (those live on ports.ubuntu.com), so we
          # must prevent apt from querying it for arm64 after adding the architecture.
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            # Insert 'Architectures: amd64' before each 'Signed-By:' line (once per stanza)
            sudo sed -i '/^Signed-By:/i Architectures: amd64' \
              /etc/apt/sources.list.d/ubuntu.sources
          fi
          # Also handle legacy sources.list (Ubuntu 22.04 fallback)
          if [ -f /etc/apt/sources.list ] && grep -q '^deb ' /etc/apt/sources.list; then
            sudo sed -i 's|^deb \([^[]\)|deb [arch=amd64] \1|' /etc/apt/sources.list
          fi

          # Add arm64 packages from Ubuntu Ports
          CODENAME=$(lsb_release -cs)
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s main restricted universe multiverse\n' \
            "$CODENAME" "${CODENAME}-updates" "${CODENAME}-security" \
            | sudo tee /etc/apt/sources.list.d/ubuntu-arm64-ports.list

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libssl-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libglib2.0-dev:arm64 \
            libsoup-3.0-dev:arm64

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set Linux aarch64 cross-compilation environment
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          # Only set these when actually cross-compiling — setting PKG_CONFIG_LIBDIR
          # to an empty string on x86_64 would wipe out all default search paths.
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build Tauri application
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C target-feature=+crt-static' || '' }}

      - name: Prepare release assets
        id: prepare_assets
        run: |
          # Native builds produce bundles at target/release/bundle/
          # Cross-compiled builds (Linux aarch64, Windows i686/aarch64) use target/<triple>/release/bundle/
          # Use find to locate the bundle regardless of where Tauri placed it.
          if [ "${{ runner.os }}" == "macOS" ]; then
            DMG=$(find src-tauri/target -name "*.dmg" -path "*/bundle/dmg/*" | head -1)
            if [ -z "$DMG" ]; then echo "ERROR: No DMG found in build output" && find src-tauri/target -name "*.dmg" 2>/dev/null; exit 1; fi
            mv "$DMG" "Anya_${{ github.ref_name }}_${{ matrix.arch }}.dmg"
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.dmg" >> $GITHUB_OUTPUT
          elif [ "${{ runner.os }}" == "Windows" ]; then
            EXE=$(find src-tauri/target -name "*.exe" -path "*/bundle/nsis/*" | head -1)
            if [ -z "$EXE" ]; then echo "ERROR: No NSIS installer found in build output" && find src-tauri/target -name "*.exe" 2>/dev/null; exit 1; fi
            mv "$EXE" "Anya_${{ github.ref_name }}_${{ matrix.arch }}.exe"
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.exe" >> $GITHUB_OUTPUT
          else
            APPIMAGE=$(find src-tauri/target -name "*.AppImage" -path "*/bundle/appimage/*" | head -1)
            if [ -z "$APPIMAGE" ]; then echo "ERROR: No AppImage found in build output" && find src-tauri/target -name "*.AppImage" 2>/dev/null; exit 1; fi
            mv "$APPIMAGE" "Anya_${{ github.ref_name }}_${{ matrix.arch }}.AppImage"
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.AppImage" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            Anya_${{ github.ref_name }}_*.dmg
            Anya_${{ github.ref_name }}_*.exe
            Anya_${{ github.ref_name }}_*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./build-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./build-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) -exec mv {} ./release-assets/ \;
          ls -la ./release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-assets/*
          draft: false
          prerelease: false
          body: |
            ## Download Anya ${{ github.ref_name }}

            ### macOS
            - **Apple Silicon (M1/M2/M3)**: `Anya_${{ github.ref_name }}_aarch64.dmg`
            - **Intel Mac**: `Anya_${{ github.ref_name }}_x86_64.dmg`

            ### Windows
            - **64-bit (x64)**: `Anya_${{ github.ref_name }}_x86_64.exe`
            - **32-bit (x86)**: `Anya_${{ github.ref_name }}_x86.exe`
            - **ARM64**: `Anya_${{ github.ref_name }}_aarch64.exe`

            ### Linux
            - **64-bit (x86_64)**: `Anya_${{ github.ref_name }}_x86_64.AppImage`
            - **ARM64**: `Anya_${{ github.ref_name }}_aarch64.AppImage`

            **System Requirements**:
            - macOS 10.13+
            - Windows 10/11
            - Linux glibc 2.29+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
