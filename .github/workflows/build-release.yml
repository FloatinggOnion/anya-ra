name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS builds
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-14
            arch: aarch64
            target: aarch64-apple-darwin
          # Windows builds
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            arch: x86
            target: i686-pc-windows-msvc
          - os: windows-latest
            arch: aarch64
            target: aarch64-pc-windows-msvc
          # Linux builds
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            arch: aarch64
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri application
        run: pnpm tauri build -- --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C target-feature=+crt-static" # For Windows builds

      - name: Prepare release assets
        id: prepare_assets
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            find src-tauri/target/release/bundle/dmg -name "*.dmg" -exec mv {} "Anya_${{ github.ref_name }}_${{ matrix.arch }}.dmg" \;
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.dmg" >> $GITHUB_OUTPUT
          elif [ "${{ runner.os }}" == "Windows" ]; then
            find src-tauri/target/release/bundle/msi -name "*.msi" -exec mv {} "Anya_${{ github.ref_name }}_${{ matrix.arch }}.msi" \;
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.msi" >> $GITHUB_OUTPUT
          else
            find src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec mv {} "Anya_${{ github.ref_name }}_${{ matrix.arch }}.AppImage" \;
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.AppImage" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            Anya_${{ github.ref_name }}_*.dmg
            Anya_${{ github.ref_name }}_*.msi
            Anya_${{ github.ref_name }}_*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./build-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./build-artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.AppImage" \) -exec mv {} ./release-assets/ \;
          ls -la ./release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release-assets/*
          draft: false
          prerelease: false
          body: |
            ## Download Anya ${{ github.ref_name }}

            ### macOS
            - **Apple Silicon (M1/M2/M3)**: `Anya_${{ github.ref_name }}_aarch64.dmg`
            - **Intel Mac**: `Anya_${{ github.ref_name }}_x86_64.dmg`

            ### Windows
            - **64-bit (x64)**: `Anya_${{ github.ref_name }}_x86_64.msi`
            - **32-bit (x86)**: `Anya_${{ github.ref_name }}_x86.msi`
            - **ARM64**: `Anya_${{ github.ref_name }}_aarch64.msi`

            ### Linux
            - **64-bit (x86_64)**: `Anya_${{ github.ref_name }}_x86_64.AppImage`
            - **ARM64**: `Anya_${{ github.ref_name }}_aarch64.AppImage`

            **System Requirements**:
            - macOS 10.13+
            - Windows 10/11
            - Linux glibc 2.29+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
