name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS builds
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-14
            arch: aarch64
            target: aarch64-apple-darwin
          # Windows builds
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            arch: x86
            target: i686-pc-windows-msvc
          - os: windows-latest
            arch: aarch64
            target: aarch64-pc-windows-msvc
          # Linux builds
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            arch: aarch64
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Install Linux x86_64 dependencies
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev libsoup-3.0-dev

      - name: Install Linux aarch64 cross-compilation dependencies
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing Ubuntu sources to amd64 only.
          # Ubuntu 24.04 uses DEB822 format in ubuntu.sources; security.ubuntu.com
          # does NOT host arm64 packages (those live on ports.ubuntu.com), so we
          # must prevent apt from querying it for arm64 after adding the architecture.
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            # Insert 'Architectures: amd64' before each 'Signed-By:' line (once per stanza)
            sudo sed -i '/^Signed-By:/i Architectures: amd64' \
              /etc/apt/sources.list.d/ubuntu.sources
          fi
          # Also handle legacy sources.list (Ubuntu 22.04 fallback)
          if [ -f /etc/apt/sources.list ] && grep -q '^deb ' /etc/apt/sources.list; then
            sudo sed -i 's|^deb \([^[]\)|deb [arch=amd64] \1|' /etc/apt/sources.list
          fi

          # Add arm64 packages from Ubuntu Ports
          CODENAME=$(lsb_release -cs)
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s main restricted universe multiverse\n' \
            "$CODENAME" "${CODENAME}-updates" "${CODENAME}-security" \
            | sudo tee /etc/apt/sources.list.d/ubuntu-arm64-ports.list

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libssl-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libglib2.0-dev:arm64 \
            libsoup-3.0-dev:arm64
          # NOTE: cross-compile env vars are intentionally NOT written to $GITHUB_ENV here.
          # If they were, cargo install tauri-cli (next step) would pick up the aarch64
          # PKG_CONFIG_PATH, add /usr/lib/aarch64-linux-gnu to the linker search path, and
          # fail with "incompatible with elf64-littleaarch64". They are set only on the
          # build step below where they are actually needed.

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri application
        run: pnpm tauri build -- --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C target-feature=+crt-static' || '' }} # Windows only — Linux GTK libs are dynamic
          # Cross-compilation env vars for Linux aarch64 — scoped to this step only
          PKG_CONFIG_PATH: ${{ matrix.arch == 'aarch64' && runner.os == 'Linux' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
          PKG_CONFIG_SYSROOT_DIR: ${{ matrix.arch == 'aarch64' && runner.os == 'Linux' && '/' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.arch == 'aarch64' && runner.os == 'Linux' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Prepare release assets
        id: prepare_assets
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            find src-tauri/target/release/bundle/dmg -name "*.dmg" -exec mv {} "Anya_${{ github.ref_name }}_${{ matrix.arch }}.dmg" \;
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.dmg" >> $GITHUB_OUTPUT
          elif [ "${{ runner.os }}" == "Windows" ]; then
            find src-tauri/target/release/bundle/msi -name "*.msi" -exec mv {} "Anya_${{ github.ref_name }}_${{ matrix.arch }}.msi" \;
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.msi" >> $GITHUB_OUTPUT
          else
            find src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec mv {} "Anya_${{ github.ref_name }}_${{ matrix.arch }}.AppImage" \;
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.AppImage" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            Anya_${{ github.ref_name }}_*.dmg
            Anya_${{ github.ref_name }}_*.msi
            Anya_${{ github.ref_name }}_*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./build-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./build-artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.AppImage" \) -exec mv {} ./release-assets/ \;
          ls -la ./release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release-assets/*
          draft: false
          prerelease: false
          body: |
            ## Download Anya ${{ github.ref_name }}

            ### macOS
            - **Apple Silicon (M1/M2/M3)**: `Anya_${{ github.ref_name }}_aarch64.dmg`
            - **Intel Mac**: `Anya_${{ github.ref_name }}_x86_64.dmg`

            ### Windows
            - **64-bit (x64)**: `Anya_${{ github.ref_name }}_x86_64.msi`
            - **32-bit (x86)**: `Anya_${{ github.ref_name }}_x86.msi`
            - **ARM64**: `Anya_${{ github.ref_name }}_aarch64.msi`

            ### Linux
            - **64-bit (x86_64)**: `Anya_${{ github.ref_name }}_x86_64.AppImage`
            - **ARM64**: `Anya_${{ github.ref_name }}_aarch64.AppImage`

            **System Requirements**:
            - macOS 10.13+
            - Windows 10/11
            - Linux glibc 2.29+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
