name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds - both use macos-latest (Apple Silicon runner)
          # x86_64 is cross-compiled from ARM64 (Tauri 2.x supports this)
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
          # Windows builds
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            arch: x86
            target: i686-pc-windows-msvc
          - os: windows-latest
            arch: aarch64
            target: aarch64-pc-windows-msvc
          # Linux builds
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          # Native ARM64 runner — avoids QEMU for linuxdeploy AppImage bundling
          - os: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Set up MSVC ARM64 cross-compilation environment
        if: runner.os == 'Windows' && matrix.arch == 'aarch64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev libsoup-3.0-dev

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri application
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C target-feature=+crt-static' || '' }}
          # AppImages try to FUSE-mount themselves; GitHub runners have no FUSE.
          # This flag makes the AppImage runtime extract-and-run instead.
          APPIMAGE_EXTRACT_AND_RUN: ${{ runner.os == 'Linux' && '1' || '' }}

      - name: Prepare release assets
        id: prepare_assets
        run: |
          # Native builds produce bundles at target/release/bundle/
          # Cross-compiled builds (Linux aarch64, Windows i686/aarch64) use target/<triple>/release/bundle/
          # Use find to locate the bundle regardless of where Tauri placed it.
          if [ "${{ runner.os }}" == "macOS" ]; then
            DMG=$(find src-tauri/target -name "*.dmg" -path "*/bundle/dmg/*" | head -1)
            if [ -z "$DMG" ]; then echo "ERROR: No DMG found in build output" && find src-tauri/target -name "*.dmg" 2>/dev/null; exit 1; fi
            mv "$DMG" "Anya_${{ github.ref_name }}_${{ matrix.arch }}.dmg"
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.dmg" >> $GITHUB_OUTPUT
          elif [ "${{ runner.os }}" == "Windows" ]; then
            EXE=$(find src-tauri/target -name "*.exe" -path "*/bundle/nsis/*" | head -1)
            if [ -z "$EXE" ]; then echo "ERROR: No NSIS installer found in build output" && find src-tauri/target -name "*.exe" 2>/dev/null; exit 1; fi
            mv "$EXE" "Anya_${{ github.ref_name }}_${{ matrix.arch }}.exe"
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.exe" >> $GITHUB_OUTPUT
          else
            APPIMAGE=$(find src-tauri/target -name "*.AppImage" -path "*/bundle/appimage/*" | head -1)
            if [ -z "$APPIMAGE" ]; then echo "ERROR: No AppImage found in build output" && find src-tauri/target -name "*.AppImage" 2>/dev/null; exit 1; fi
            mv "$APPIMAGE" "Anya_${{ github.ref_name }}_${{ matrix.arch }}.AppImage"
            echo "asset_path=Anya_${{ github.ref_name }}_${{ matrix.arch }}.AppImage" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            Anya_${{ github.ref_name }}_*.dmg
            Anya_${{ github.ref_name }}_*.exe
            Anya_${{ github.ref_name }}_*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./build-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./build-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) -exec mv {} ./release-assets/ \;
          ls -la ./release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-assets/*
          draft: false
          prerelease: false
          body: |
            ## Download Anya ${{ github.ref_name }}

            ### macOS
            - **Apple Silicon (M1/M2/M3)**: `Anya_${{ github.ref_name }}_aarch64.dmg`
            - **Intel Mac**: `Anya_${{ github.ref_name }}_x86_64.dmg`

            ### Windows
            - **64-bit (x64)**: `Anya_${{ github.ref_name }}_x86_64.exe`
            - **32-bit (x86)**: `Anya_${{ github.ref_name }}_x86.exe`
            - **ARM64**: `Anya_${{ github.ref_name }}_aarch64.exe`

            ### Linux
            - **64-bit (x86_64)**: `Anya_${{ github.ref_name }}_x86_64.AppImage`
            - **ARM64**: `Anya_${{ github.ref_name }}_aarch64.AppImage`

            **System Requirements**:
            - macOS 10.13+
            - Windows 10/11
            - Linux glibc 2.29+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
